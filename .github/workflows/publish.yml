name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number to publish bottles from
        required: true
        type: number

jobs:
  pr-pull:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.inputs.pull_request || github.event.pull_request.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.inputs.pull_request || github.event.pull_request.number }}
        run: |
          branch="$(gh pr view "$PULL_REQUEST" --repo "$GITHUB_REPOSITORY" \
            --json headRefName,isCrossRepository \
            --jq 'select(.isCrossRepository == false) | .headRefName')"
          if [[ -n "$branch" ]] && git ls-remote --exit-code --heads origin "refs/heads/$branch"; then
            git push --delete origin "$branch"
          fi
